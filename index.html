<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRASIL PLAY ALPHAN - Formulário Líder</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}
.container {
    max-width: 600px;
    margin: 30px auto;
    padding: 20px;
    background: #111;
    border-radius: 10px;
}
input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}
button {
    padding: 15px;
    width: 100%;
    background: #00ffc8;
    border: none;
    font-weight: bold;
}
</style>
</head>

<body>

<form class="container" action="https://formspree.io/f/xnjlayyj" method="POST" onsubmit="montarFormulario()">

<h2>📩 FORMULÁRIO DE LÍDER</h2>

<input id="nome" placeholder="1. Nome">
<input id="idade" placeholder="2. Idade">
<input id="org" placeholder="3. Organização">
<input id="experiencia" placeholder="4. Experiência">
<input id="tempoDia" placeholder="5. Tempo online">

<textarea id="escolha" placeholder="6. Por que você deve ser escolhido?"></textarea>
<textarea id="briga" placeholder="7. Se membros brigarem?"></textarea>
<textarea id="desobediente" placeholder="8. Como lida com desobedientes?"></textarea>

<textarea id="liderancaReal" placeholder="9. O que é liderança?"></textarea>
<textarea id="pressao" placeholder="10. Como reage sob pressão?"></textarea>
<textarea id="erro" placeholder="11. Se errar?"></textarea>

<textarea id="atividade" placeholder="12. Como manter equipe ativa?"></textarea>
<textarea id="punicao" placeholder="13. Quando punir?"></textarea>
<textarea id="confianca" placeholder="14. Como ganha confiança?"></textarea>

<textarea id="liderRuim" placeholder="15. O que líder não pode fazer?"></textarea>
<textarea id="melhoria" placeholder="16. Melhorias?"></textarea>
<textarea id="motivacao" placeholder="17. Motivação?"></textarea>
<textarea id="tempoServidor" placeholder="18. Tempo no servidor?"></textarea>

<select id="equipe">
<option>19. Trabalha em equipe?</option>
<option>Sim</option>
<option>Não</option>
</select>

<select id="ativo">
<option>20. Ativo?</option>
<option>Sim</option>
<option>Não</option>
</select>

<select id="lideranca">
<option>21. Perfil de liderança?</option>
<option>Sim</option>
<option>Mais ou menos</option>
<option>Não</option>
</select>

<select id="liderAntes">
<option>22. Já foi líder?</option>
<option>Sim</option>
<option>Não</option>
</select>

<select id="regras">
<option>23. Conhece regras?</option>
<option>Sim</option>
<option>Não</option>
</select>

<input id="discord" placeholder="24. Discord">
<input id="telefone" placeholder="25. Telefone">

<!-- CAMPO QUE VAI ORGANIZADO -->
<textarea name="mensagem" id="mensagem" hidden></textarea>

<button type="submit">🚀 ENVIAR</button>

</form>

<script>
function montarFormulario(){

let texto = `
══════════════════════
👑 FORMULÁRIO DE LÍDER
══════════════════════

1. Nome: ${nome.value}
2. Idade: ${idade.value}
3. Organização: ${org.value}
4. Experiência: ${experiencia.value}
5. Tempo online: ${tempoDia.value}

6. Por que deve ser escolhido:
${escolha.value}

7. Se membros brigarem:
${briga.value}

8. Como lida com desobedientes:
${desobediente.value}

9. O que é liderança:
${liderancaReal.value}

10. Reação sob pressão:
${pressao.value}

11. Se errar:
${erro.value}

12. Manter equipe ativa:
${atividade.value}

13. Quando punir:
${punicao.value}

14. Ganhar confiança:
${confianca.value}

15. Líder nunca pode:
${liderRuim.value}

16. Melhorias:
${melhoria.value}

17. Motivação:
${motivacao.value}

18. Tempo no servidor:
${tempoServidor.value}

19. Trabalha em equipe: ${equipe.value}
20. Ativo: ${ativo.value}
21. Perfil liderança: ${lideranca.value}
22. Já foi líder: ${liderAntes.value}
23. Conhece regras: ${regras.value}

24. Discord: ${discord.value}
25. Telefone: ${telefone.value}

══════════════════════
`;

document.getElementById("mensagem").value = texto;
}
</script>

</body>
</html>
